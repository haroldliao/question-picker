<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>活動提問轉盤</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7fb;
      --panel: #ffffff;
      --ink: #1c2733;
      --muted: #667382;
      --line: #d8e0ea;
      --accent: #1769aa;
      --accent-dark: #0f4f82;
      --picked: #e9f7ef;
      --picked-line: #62b178;
      --current: #fff3cd;
      --current-line: #d49a16;
      --danger: #b42318;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft JhengHei", "PingFang TC", "Noto Sans TC", Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    main {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 36px;
    }

    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 48px);
      line-height: 1.08;
      letter-spacing: 0;
    }

    .counter {
      min-width: 132px;
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      text-align: center;
      font-weight: 700;
      color: var(--accent-dark);
    }

    .stage {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 310px;
      gap: 18px;
      align-items: start;
    }

    .result {
      min-height: 186px;
      padding: 22px;
      border: 2px solid var(--accent);
      border-radius: 8px;
      background: var(--panel);
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 10px;
    }

    .result-label {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      font-weight: 700;
    }

    .result-question {
      margin: 0;
      font-size: clamp(24px, 3.7vw, 42px);
      line-height: 1.32;
      font-weight: 800;
      word-break: break-word;
    }

    .controls {
      display: grid;
      gap: 10px;
    }

    button {
      min-height: 56px;
      border: 0;
      border-radius: 8px;
      padding: 0 18px;
      font: inherit;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      transition: transform .16s ease, background .16s ease, border-color .16s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    .primary,
    .secondary {
      background: var(--accent);
      color: #fff;
    }

    .primary:hover,
    .secondary:hover {
      background: var(--accent-dark);
    }

    .reset {
      background: #fff;
      color: var(--danger);
      border: 1px solid #efb5af;
    }

    .reset:hover {
      background: #fff4f2;
    }

    button:disabled {
      cursor: not-allowed;
      transform: none;
      background: #d5dde6;
      color: #748293;
      border-color: #d5dde6;
    }

    .question-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 18px;
      padding: 0;
      list-style: none;
    }

    .question-item {
      min-height: 86px;
      padding: 14px 14px 14px 16px;
      border: 1px solid var(--line);
      border-left: 6px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      display: grid;
      grid-template-columns: 36px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
    }

    .question-item.picked {
      background: var(--picked);
      border-color: var(--picked-line);
      border-left-color: var(--picked-line);
    }

    .question-item.current {
      background: var(--current);
      border-color: var(--current-line);
      border-left-color: var(--current-line);
    }

    .number {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: #eef3f8;
      color: var(--accent-dark);
      font-weight: 800;
    }

    .question-item.picked .number {
      background: #d4efdd;
      color: #236b3b;
    }

    .question-item.current .number {
      background: #ffd978;
      color: #6f4700;
    }

    .text {
      margin: 0;
      line-height: 1.55;
      font-size: 17px;
      word-break: break-word;
    }

    @media (max-width: 820px) {
      header,
      .stage {
        display: grid;
        grid-template-columns: 1fr;
      }

      .counter {
        width: 100%;
      }

      .question-list {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>活動提問轉盤</h1>
      <div class="counter" id="counter">已抽 0 / 14</div>
    </header>

    <section class="stage" aria-label="提問區">
      <div class="result" aria-live="polite">
        <p class="result-label" id="resultLabel">目前題目</p>
        <p class="result-question" id="resultQuestion">請按下進行提問</p>
      </div>

      <div class="controls">
        <button type="button" class="primary" id="askBtn">進行提問</button>
        <button type="button" class="secondary" id="continueBtn">繼續提問</button>
        <button type="button" class="reset" id="resetBtn">Reset</button>
      </div>
    </section>

    <ol class="question-list" id="questionList" aria-label="題目列表"></ol>
  </main>

  <script>
    const questions = [
      "在《青春末世物語」一劇中，在電影的結尾，悠多與小幸最後道別的地點在哪裡？",
      "哪一個樂團參與了《欠妳的那場婚禮》音樂合作並客串演出？",
      "在《重返月球：太空新世紀》紀錄片中，執行人類首次登月任務的是哪一個太空計畫或任務？",
      "在《泰勒絲：不只是美國小姐》紀錄片中，泰勒絲的未婚夫是哪種職業運動的球星？",
      "《寰宇龍虎豹》的主持人中，誰曾經擔任過台北市議員?",
      "村上隆暌違多年的展覽，是在日本哪個城市推出？",
      "《喵的奇幻漂流》中，主角「喵喵」是什麼顏色的呢？",
      "《萌寵列車》中，獵鷹的師傅「叔叔們」總共有幾位？",
      "中華職棒二軍總共有幾個球隊呢?",
      "甲子園是發生在哪個國家最知名的棒球賽事之一",
      "你今天參觀的電視台叫甚麼電視台?",
      "最多台灣原創影片的影音平台是甚麼平台",
      "最多優質卡通的影音平台是甚麼平台",
      "你現在在什麼攤位?"
    ];

    const state = {
      order: [],
      picked: new Set(),
      current: null
    };

    const askBtn = document.querySelector("#askBtn");
    const continueBtn = document.querySelector("#continueBtn");
    const resetBtn = document.querySelector("#resetBtn");
    const counter = document.querySelector("#counter");
    const resultLabel = document.querySelector("#resultLabel");
    const resultQuestion = document.querySelector("#resultQuestion");
    const questionList = document.querySelector("#questionList");

    function shuffle(items) {
      const copy = [...items];
      for (let index = copy.length - 1; index > 0; index -= 1) {
        const randomIndex = Math.floor(Math.random() * (index + 1));
        [copy[index], copy[randomIndex]] = [copy[randomIndex], copy[index]];
      }
      return copy;
    }

    function pickFrom(indexes) {
      if (indexes.length === 0) {
        resultLabel.textContent = "目前題目";
        resultQuestion.textContent = "所有題目都已抽完";
        continueBtn.disabled = true;
        return;
      }

      const next = indexes[Math.floor(Math.random() * indexes.length)];
      state.current = next;
      state.picked.add(next);
      resultLabel.textContent = `第 ${next + 1} 題`;
      resultQuestion.textContent = questions[next];
      render();
    }

    function askQuestion() {
      pickFrom(questions.map((_, index) => index));
    }

    function continueQuestion() {
      const available = questions
        .map((_, index) => index)
        .filter((index) => !state.picked.has(index));
      pickFrom(available);
    }

    function resetQuestions() {
      state.order = shuffle(questions.map((_, index) => index));
      state.picked.clear();
      state.current = null;
      resultLabel.textContent = "目前題目";
      resultQuestion.textContent = "請按下進行提問";
      render();
    }

    function render() {
      questionList.replaceChildren();

      state.order.forEach((questionIndex) => {
        const item = document.createElement("li");
        item.className = "question-item";
        if (state.picked.has(questionIndex)) item.classList.add("picked");
        if (state.current === questionIndex) item.classList.add("current");

        const number = document.createElement("span");
        number.className = "number";
        number.textContent = questionIndex + 1;

        const text = document.createElement("p");
        text.className = "text";
        text.textContent = questions[questionIndex];

        item.append(number, text);
        questionList.append(item);
      });

      counter.textContent = `已抽 ${state.picked.size} / ${questions.length}`;
      continueBtn.disabled = state.picked.size >= questions.length;
    }

    askBtn.addEventListener("click", askQuestion);
    continueBtn.addEventListener("click", continueQuestion);
    resetBtn.addEventListener("click", resetQuestions);

    resetQuestions();
  </script>
</body>
</html>
